<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Financeiro</title>
</head>
<body>

<h1>Qual seria a sua economia com perdas? (Anual)</h1>
<br>

<label for="id_peso_total"><b>Insira quantas toneladas de tilápia exportada anualmente: <input type="text" id="id_peso_total" placeholder="Digite aqui"> Ton</b></label>

<br>
<br>

<label for="id_preco_medio_kg"><b>Insira o preço médio do Kg de tilápia: $<input type="text" id="id_preco_medio_kg" placeholder="Digite aqui"> USD</b></label>
<br>
<br>

<button onclick="calcular_simulacao()"><h3>Simular Economia</h3></button>
<br>

<p id="msg_prejuizo"></p>
<p id="msg_economia"></p>
    
</body>

<script>

function calcular_simulacao(){
    let peso_total = Number (id_peso_total.value);
    let preco_medio_kg = Number (id_preco_medio_kg.value);

    peso_total_kg = (peso_total * 1000);
    preco_medio_total = (peso_total_kg * preco_medio_kg);

    valor_total_prejuizo = (preco_medio_total * 0.09);
    valor_minimo_economia = (valor_total_prejuizo * 0.15);
    valor_maximo_economia = (valor_total_prejuizo * 0.23);

    msg_prejuizo.innerHTML = `O prejuízo total é de <span style = "color: red">$ ${valor_total_prejuizo} USD</span>`
    msg_economia.innerHTML = `A economia média será de <span style = "color: green">$ ${valor_minimo_economia} USD</span> 
    até <span style = "color: green">$ ${valor_maximo_economia} USD</span>`
}

</script>
</html>
